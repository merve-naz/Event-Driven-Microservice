twitter-to-kafka-service:
  streaming-data-keywords:
    - "AI"
    - "Artificial Intelligence"
    - "Machine Learning"
    - "Deep Learning"
    - "Neural Networks"
  ai-service: SpringAI-OpenAI
  schedule-duration-ms: 30000
  prompt: "Generate a json with 4 elements called createdAt, id, text and user. The user element has also a nested json element called id. For text use a string including one or more of the keywords: {keywords}. For id field of the user field use a long value. Do not use new lines in the response. Do not include the L letter at the end of the long values. Only give 1 result in the response."
  keywords-placeholder: '{keywords}'
  open-ai:
    url: "https://api.openai.com/v1/chat/completions"
    api-key: ${OPENAI_API_KEY}
    content-type: "application/json"
    model: "gpt-4o-mini"
    max-completion-tokens: 150
    temperature: 1
    messages:
      - role: "user"
        content:
          - type: "text"
spring:
  ai:
    openai:
      api-key: "sk-proj-xxxx"
      url: "https://api.openai.com/v1/chat/completions"
      model: "gpt-4o-mini"
      chat:
        options:
          model: "gpt-4o-mini"
          temperature: 1
          maxTokens: 150

retry-config:
  initial-interval-ms: 1000
  max-interval-ms: 10000
  multiplier: 2
  max-attempts: 5
  sleep-time-ms: 2000

kafka-config:
  bootstrap-servers: localhost:19092, localhost:29092, localhost:39092
  topic-name: twitter-topic
  topic-names-to-create:
    - twitter-topic
  num-partitions: 3
  replication-factor: 3

kafka-producer-config:
  key-serializer-class: org.apache.kafka.common.serialization.LongSerializer
  value-serializer-class: io.confluent.kafka.serializers.KafkaAvroSerializer
  compression-type: snappy
  acks: all
  batch-size: 16384
  batch-size-boost-factor: 100
  linger-ms: 5
  request-timeout-ms: 60000
  retry-count: 5
