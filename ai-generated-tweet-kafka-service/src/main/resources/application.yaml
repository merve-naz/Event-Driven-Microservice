twitter-to-kafka-service:
 streaming-data-keywords:
    - "AI"
    - "Artificial Intelligence"
    - "Machine Learning"
    - "Deep Learning"
    - "Neural Networks"
 ai-service: SpringAI-OpenAI
 schedule-duration-ms: 30000
 prompt: "Generate a json with 4 elements called createdAt, id, text and user. The user element has also a nested json element called id. For text use a string including one or more of the keywords: {keywords}. For id field of the user field use a long value. Do not use new lines in the response. Do not include the L letter at the end of the long values. Only give 1 result in the response."
 keywords-placeholder: '{keywords}'
 open-ai:
   url: "https://api.openai.com/v1/chat/completions"
   api-key: ${OPENAI_API_KEY}
   content-type: "application/json"
   model: "gpt-4o-mini"
   max-completion-tokens: 150
   temperature: 1
   messages:
       - role: "user"
         content:
           - type: "text"
spring:
   ai:
     openai:
       api-key: ${OPENAI_API_KEY}
       url: "https://api.openai.com/v1/chat/completions"
       model: "gpt-4o-mini"
       chat:
         options:
           model: "gpt-4o-mini"
           temperature: 1
           maxTokens: 150